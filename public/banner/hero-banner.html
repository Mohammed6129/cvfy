<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap');

:root {
  --blue: #378ADD;
  --blue-light: #5BA3E8;
  --blue-dark: #0C447C;
  --navy: #082040;
  --amber: #FAC775;
  --glass-border: rgba(255,255,255,0.14);
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Baloo Bhaijaan 2', sans-serif;
  overflow: hidden;
}

.hero {
  position: relative;
  width: 100%;
  aspect-ratio: 16/8;
  min-height: 480px;
  background: transparent;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* ambient floating particles */
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--blue-light);
  opacity: 0.18;
  filter: blur(1px);
  animation: float 14s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) translateX(0); }
  50% { transform: translateY(-22px) translateX(10px); }
}

.content-wrap {
  position: relative;
  width: 100%;
  max-width: 1100px;
  height: 100%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 0 24px;
  z-index: 3;
}

/* ===== TEXT BLOCK (right side, RTL-first) ===== */
.text-block {
  flex: 0 0 44%;
  max-width: 44%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 20px;
  text-align: right;
}

.eyebrow .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 0 0 rgba(250,199,117,0.6);
  animation: pulseDot 2.2s ease-out infinite;
}

h1.headline {
  font-size: clamp(26px, 3.4vw, 44px);
  line-height: 1.32;
  font-weight: 700;
  color: #ffffff;
  max-width: 520px;
  opacity: 0;
  animation: fadeUp 0.8s ease-out 0.2s forwards;
}
h1.headline .accent {
  color: var(--amber);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulseDot {
  0% { box-shadow: 0 0 0 0 rgba(250,199,117,0.55); }
  70% { box-shadow: 0 0 0 8px rgba(250,199,117,0); }
  100% { box-shadow: 0 0 0 0 rgba(250,199,117,0); }
}

/* ===== MAP BLOCK (left side) ===== */
.map-block {
  flex: 0 0 38%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 92%;
}

.map-glow {
  position: absolute;
  width: 70%;
  height: 70%;
  background: radial-gradient(circle, rgba(91,163,232,0.35) 0%, rgba(91,163,232,0) 70%);
  filter: blur(10px);
  animation: glowPulse 5s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.06); }
}

svg.saudi-map {
  position: relative;
  width: 100%;
  max-width: 440px;
  height: auto;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.35));
  z-index: 2;
}

.region {
  fill: rgba(91,163,232,0.16);
  stroke: var(--blue-light);
  stroke-width: 1.4;
  stroke-dasharray: 2400;
  stroke-dashoffset: 2400;
  animation: drawRegion 2.6s ease-out forwards, fillRegion 1.2s ease-out 1.8s forwards;
}

@keyframes drawRegion {
  to { stroke-dashoffset: 0; }
}
@keyframes fillRegion {
  to { fill: rgba(91,163,232,0.30); }
}

/* stagger region fill slightly for organic feel */
.region:nth-of-type(odd) { animation-delay: 0s, 1.6s; }
.region:nth-of-type(even) { animation-delay: 0.15s, 1.9s; }

.riyadh-marker {
  opacity: 0;
  animation: markerIn 0.6s ease-out 2.3s forwards;
}
@keyframes markerIn {
  from { opacity: 0; transform: scale(0); }
  to { opacity: 1; transform: scale(1); }
}

.riyadh-ping {
  fill: none;
  stroke: var(--amber);
  stroke-width: 2.5;
  opacity: 0;
  transform-origin: 530.2px 476.2px;
  animation: ping 2.4s ease-out 2.6s infinite;
}
@keyframes ping {
  0% { opacity: 0.9; transform: scale(0.3); }
  70% { opacity: 0; transform: scale(2.6); }
  100% { opacity: 0; transform: scale(2.6); }
}

.riyadh-dot {
  fill: var(--amber);
}

/* Responsive: stack on narrow viewports */
@media (max-width: 820px) {
  .content-wrap { flex-direction: column-reverse; justify-content: center; gap: 18px; padding: 28px 6%; }
  .text-block, .map-block { flex: none; width: 100%; }
  .text-block { align-items: center; text-align: center; }
  .map-block { height: 38%; }
  .hero { aspect-ratio: 4/5; min-height: 640px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; }
  .region { stroke-dashoffset: 0; fill: rgba(91,163,232,0.30); }
  h1.headline, .riyadh-marker { opacity: 1; }
}
</style>
</head>
